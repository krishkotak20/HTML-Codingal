<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


</head>
<body>
    <div class="container mt-4">
        <h2>carousel example</h2> 
        <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="myCarousel" data-bs-slide-to="0" class="active"></button>
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="myCarousel" data-bs-slide-to="1">   </button>
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="myCarousel" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">
                
           
            <div class="carousel-item"></div>
              <img src="earth.jpg" class="d-block w-100" alt="img 1">
            <div class="carousel-item"></div>
            <img src="Messi.webp" class="d-block w-100" alt="img 2">
            <div class="carousel-item"></div>
            <img src="OIP.webp" class="d-block w-100" alt="img 3">
        </div>
    </div>
    <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>


    <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
</body>
