<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="id1">hi</p>
    <p id="id2"></p>
    <p id="id3"></p>
    <p id="id4"></p>
<script>
    // function expression
    let add3 = function (a,b){
        return a+b;
    }
    document.getElementById("id1").innerHTML = add3(5,9)
    
  let multiply3 = function (a,b){
    return a*b
  }
    document.getElementById("id2").innerHTML = multiply3(5,9)

     let divide3 = function (a, b) {
            return a/b
        }
        document.getElementById("id3").innerHTML = divide3(60,5)

         let subtract3 = function (a, b) {
                return a-b
            }
            document.getElementById("id4").innerHTML = subtract3(10, 2)
    

</script>

</body>
</html>
