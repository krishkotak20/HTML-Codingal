<!DOCTYPE html>
<html>

<body>

    <h2>JavaScript Class</h2>

    <p>Using a JavaScript Class with football vibes.</p>

    <p id="student1"></p>
    <p id="student2"></p>

    <script>

        // Creating a class
        class Player {
            constructor(name, year) {
                this.name = name;
                this.year = year;
            }

            // Age method
            age() {
                let date = new Date();
                return date.getFullYear() - this.year;
            }
        }

        // Using the class with two objects
        const player1 = new Player("Krish", 2018);
        document.getElementById("student1").innerHTML =
            "My name is " + player1.name + ". I started football in " + player1.year + ". I've been playing for " + player1.age() + " years. I am 13.";

        const player2 = new Player("Hashim", 2020);
        document.getElementById("student2").innerHTML =
            "My name is " + player2.name + ". I started football in " + player2.year + ". I've been playing for " + player2.age() + " years. I am 12.";

    </script>

</body>

</html>
