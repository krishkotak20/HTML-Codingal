<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="id1"></p>
    <button onclick="f1()">click me</button>
    <script>
        function f1(){
            var num1 = 7;
              var num2 = 8;

              var a = eval("num1 + num2") + "<br>";
              var b = eval("20 * 2") + "<br>";
              var c = eval("num1 - num2") + "<br>";
              var result = a + b + c;
              document.getElementById("id1").innerHTML = result

        }
    </script>
</body>
</html>
